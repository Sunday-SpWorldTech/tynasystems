<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="index,follow"><title>Join Free | Tyna Systems</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/design-system.css"></head><body data-app-page="auth"><div class="auth-public-shell no-auth-nav"><div class="auth-page"><div class="auth-card"><div class="auth-header"><a href="index.html" class="brand" style="justify-content:center;color:#0f172a"><div class="brand-mark"><img decoding="async" src="assets/images/logo.webp" alt="Tyna Systems"></div><span>TYNA<small>SYSTEMS</small></span></a><h1>Join free</h1><p class="muted">Choose Student or Business. After signup, create your secure PIN for dashboard access.</p></div><form class="form" data-joinfree-form><div class="field"><label>Full name / Username</label><input name="name" required autocomplete="name" placeholder="Your full name"></div><div class="field"><label>Main account email</label><input type="email" name="email" required autocomplete="email" placeholder="name@example.com"></div><div class="field"><label>Role</label><select name="accountType" required data-account-type><option value="student">Student learner</option><option value="business">Business / Non-student user</option></select></div><div data-student-fields><div class="field"><label>School name</label><input name="schoolName" placeholder="Your school name"></div><div class="field"><label>School email</label><input type="email" name="schoolEmail" placeholder="student@school.edu"></div><div class="field"><label>Student ID number</label><input name="studentIdNumber" placeholder="School ID / Student ID number"></div><div class="field"><label>Enrollment number</label><input name="enrollmentNumber" placeholder="Enrollment / admission number"></div><div class="field"><label>Department / Level</label><input name="department" placeholder="Department"><input name="level" placeholder="Level / year" style="margin-top:10px"></div></div><div data-business-fields><div class="field"><label>Business name</label><input name="businessName" placeholder="Company or business name"></div><div class="field"><label>Business type</label><input name="businessType" placeholder="Example: Retail, logistics, school, services"></div><div class="field"><label>Business address / country</label><input name="businessAddress" placeholder="Business address"><input name="country" placeholder="Country" style="margin-top:10px"></div><div class="field"><label>Business contact</label><input type="email" name="businessEmail" placeholder="name@company.com"><input name="businessPhone" placeholder="Business phone" style="margin-top:10px"></div><div class="field"><label>Service needed</label><textarea name="serviceNeeded" rows="3" placeholder="Tell us what system, website, dashboard, automation, academy or support you need"></textarea></div></div><div class="field"><label>Password</label><input type="password" name="password" required minlength="8" autocomplete="new-password" placeholder="At least 8 characters"></div><div class="field"><label>Create Secure PIN</label><input type="password" name="pin" required inputmode="numeric" pattern="[0-9]{4,8}" autocomplete="new-password" placeholder="4 to 8 digit PIN"></div><button class="btn gold wide" type="submit">Create Account & Save PIN</button><div class="hidden" data-form-message></div></form><div class="auth-footer">Already have an account? <a href="login.html">Login</a></div></div></div><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></div></body></html>
