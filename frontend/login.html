<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><meta name="robots" content="index,follow"><title>Login | Tyna Systems</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="assets/css/design-system.css"></head><body data-app-page="auth"><div class="auth-public-shell no-auth-nav"><div class="auth-page"><div class="auth-card"><div class="auth-header"><a href="index.html" class="brand" style="justify-content:center;color:#0f172a"><div class="brand-mark"><img decoding="async" src="assets/images/logo.webp" alt="Tyna Systems"></div><span>TYNA<small>SYSTEMS</small></span></a><h1>User Login</h1><p class="muted">Login with username, school email, or business email plus your secure PIN.</p></div><form class="form" data-login-form><div class="field"><label>Username / School email / Business email</label><input name="loginId" required autocomplete="username" placeholder="name, student@school.edu, or business@email.com"></div><div class="field"><label>Password</label><input type="password" name="password" required autocomplete="current-password" placeholder="••••••••"></div><div class="field"><label>Secure PIN</label><input type="password" name="pin" required inputmode="numeric" pattern="[0-9]{4,8}" autocomplete="current-password" placeholder="4 to 8 digit PIN"></div><button class="btn dark wide" type="submit">Login to Dashboard</button><div class="hidden" data-form-message></div></form><div class="auth-footer">No account yet? <a href="joinfree.html">Join free</a> · <a href="#" data-pin-reset-link>Retrieve / reset PIN</a></div></div></div><script src="assets/js/config.js"></script><script src="assets/js/app.js"></script></div></body></html>
